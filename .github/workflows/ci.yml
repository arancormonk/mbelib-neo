name: CI

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    tags:
      - "v*.*.*"
    paths-ignore:
      - ".github/*.yml"
      - ".github/*.yaml"
      - ".github/**/*.yml"
      - ".github/**/*.yaml"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/*.yml"
      - ".github/*.yaml"
      - ".github/**/*.yml"
      - ".github/**/*.yaml"
      - "**/*.md"

permissions:
  contents: read

jobs:
  build-test:
    needs: [format-check, clang-tidy, cppcheck, scan-build, semgrep]
    name: ${{ matrix.os }} • preset=${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        preset: [dev-debug, dev-release, notones-debug]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}
      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }} --parallel
      - name: Test (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }} -V

  sanitize-linux:
    needs: [format-check, clang-tidy, cppcheck, scan-build, semgrep]
    name: linux • Debug • sanitizers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Configure (asan-ubsan-debug)
        run: cmake --preset asan-ubsan-debug
      - name: Build (asan-ubsan-debug)
        run: cmake --build --preset asan-ubsan-debug --parallel
      - name: Test (asan-ubsan-debug)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --preset asan-ubsan-debug -V

  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files '*.c' '*.cc' '*.cxx' '*.cpp' '*.h' '*.hpp' ':!:build/**' ':!:src/external/**')
          if [ "${#files[@]}" -eq 0 ]; then echo "No C/C++ files to check"; exit 0; fi
          clang-format --version
          # Prefer dry-run Werror if supported; fallback to diff
          if clang-format -n --Werror "${files[@]}" 2>/dev/null; then
            echo "Formatting OK (clang-format -n --Werror)"
          else
            echo "clang-format -n --Werror unsupported or failed; using diff"
            diff -u <(cat "${files[@]}") <(clang-format "${files[@]}") || (echo "Run tools/format.sh" && exit 1)
          fi

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy ripgrep iwyu build-essential cmake ninja-build pkg-config git ccache
      - name: Prepare ccache environment
        run: |
          set -euxo pipefail
          {
            echo "CCACHE_DIR=${GITHUB_WORKSPACE}/.ccache"
            echo "CC=ccache gcc"
            echo "CXX=ccache g++"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_NOHASHDIR=true"
            echo "CCACHE_SLOPPINESS=time_macros"
          } >> "$GITHUB_ENV"
          mkdir -p "${GITHUB_WORKSPACE}/.ccache"
      - name: Compute tool versions (for ccache key)
        id: toolver-tidy
        run: |
          set -euxo pipefail
          echo "gcc_ver=$(gcc -dumpfullversion -dumpversion || gcc --version | head -n1)" >> "$GITHUB_OUTPUT"
          echo "cmake_ver=$(cmake --version | head -n1 | awk '{print $3}')" >> "$GITHUB_OUTPUT"
      - name: Restore ccache
        uses: actions/cache@v5.0.4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.job }}-${{ steps.toolver-tidy.outputs.gcc_ver }}-${{ steps.toolver-tidy.outputs.cmake_ver }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.job }}-${{ steps.toolver-tidy.outputs.gcc_ver }}-${{ steps.toolver-tidy.outputs.cmake_ver }}-
            ccache-${{ runner.os }}-${{ github.job }}-
            ccache-${{ runner.os }}-
      - name: Initialize ccache
        run: |
          ccache --version
          ccache --zero-stats
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
      - name: Configure (dev-debug preset)
        run: cmake --preset dev-debug
      - name: Run clang-tidy (strict)
        run: tools/clang_tidy.sh --strict
      - name: Upload clang-tidy output
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: clang-tidy-report
          path: .clang-tidy.local.out
          include-hidden-files: true
          retention-days: 7
      - name: Run IWYU
        run: tools/iwyu.sh --strict
      - name: Upload IWYU output
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: iwyu-report
          path: .iwyu.local.out
          include-hidden-files: true
          retention-days: 7
      - name: Run GCC fanalyzer (strict)
        run: tools/gcc_fanalyzer.sh --strict
      - name: Upload GCC fanalyzer output
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: gcc-fanalyzer-report
          path: .gcc-fanalyzer.local.out
          include-hidden-files: true
          retention-days: 7
      - name: Show ccache stats
        if: always()
        run: ccache -s

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Configure (dev-debug preset)
        run: cmake --preset dev-debug

      - name: Run cppcheck (strict)
        run: |
          tools/cppcheck.sh --strict
      - name: Upload cppcheck output
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cppcheck-report
          path: .cppcheck.local.out
          include-hidden-files: true
          retention-days: 7

  scan-build:
    name: scan-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install scan-build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tools cmake ninja-build pkg-config git build-essential
      - name: Run scan-build
        run: |
          tools/scan_build.sh --strict
      - name: Upload scan-build output
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: scan-build-report
          path: |
            .scan-build.local.out
            .scan-build.local
          include-hidden-files: true
          retention-days: 7

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"
      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep
      - name: Run Semgrep
        run: tools/semgrep.sh --strict
      - name: Upload Semgrep output
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: semgrep-report
          path: .semgrep.local.out
          include-hidden-files: true
          retention-days: 7

  validate-release-tag:
    name: Validate release tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
      archive_prefix: ${{ steps.verify.outputs.archive_prefix }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Configure release metadata
        run: cmake --preset dev-release -DMBELIB_BUILD_TESTS=OFF -DMBELIB_BUILD_EXAMPLES=OFF
      - name: Verify tag matches project version
        id: verify
        shell: bash
        env:
          RELEASE_TAG_CREATED: ${{ github.event.created }}
        run: |
          set -euxo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [ "${version}" = "${tag}" ]; then
            echo "Release tags must start with 'v'." >&2
            exit 1
          fi
          if [ "${GITHUB_EVENT_NAME}" != "push" ] || [ "${RELEASE_TAG_CREATED}" != "true" ]; then
            echo "Release publishing requires a newly created version tag push; refusing to publish ${tag}." >&2
            exit 1
          fi

          project_version=$(sed -nE 's/^#define MBELIB_VERSION "([^"]+)"$/\1/p' \
            build/dev-release/include/mbelib-neo/version.h)
          if [ -z "${project_version}" ]; then
            echo "Failed to read MBELIB_VERSION from generated header." >&2
            exit 1
          fi
          if [ "${version}" != "${project_version}" ]; then
            echo "Tag ${tag} does not match project version ${project_version}." >&2
            exit 1
          fi

          echo "version=${project_version}" >> "$GITHUB_OUTPUT"
          echo "archive_prefix=mbelib-neo-${project_version}" >> "$GITHUB_OUTPUT"

  update-aur-git:
    name: Update AUR package (git)
    needs: [format-check, clang-tidy, cppcheck, scan-build, semgrep, build-test, sanitize-linux, validate-release-tag]
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      AUR_MAKEPKG_USER: aurbuilder
    defaults:
      run:
        shell: bash
    # Run on upstream non-PR refs. For version tags, only proceed after release validation succeeds.
    if: >-
      ${{
        always() &&
        github.repository == 'arancormonk/mbelib-neo' &&
        github.event_name != 'pull_request' &&
        needs.format-check.result == 'success' &&
        needs.clang-tidy.result == 'success' &&
        needs.cppcheck.result == 'success' &&
        needs.scan-build.result == 'success' &&
        needs.semgrep.result == 'success' &&
        needs.build-test.result == 'success' &&
        needs.sanitize-linux.result == 'success' &&
        (
          !startsWith(github.ref, 'refs/tags/v') ||
          needs.validate-release-tag.result == 'success'
        )
      }}
    steps:
      - name: Check AUR SSH key availability
        id: aur_key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "AUR_SSH_PRIVATE_KEY is not set; skipping AUR update steps."
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install AUR tooling
        if: steps.aur_key.outputs.has_key == 'true'
        run: pacman -Syu --noconfirm --needed git openssh

      - name: Create makepkg user
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          if ! id -u "$AUR_MAKEPKG_USER" >/dev/null 2>&1; then
            useradd --create-home --shell /bin/bash "$AUR_MAKEPKG_USER"
          fi

      - name: Checkout repository
        if: steps.aur_key.outputs.has_key == 'true'
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        if: steps.aur_key.outputs.has_key == 'true'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Refresh latest main ref
        if: steps.aur_key.outputs.has_key == 'true'
        run: git fetch --force origin refs/heads/main:refs/remotes/origin/main --tags

      - name: Setup SSH for AUR
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR package
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git clone ssh://aur@aur.archlinux.org/mbelib-neo-git.git aur-package
          git config --global --add safe.directory "$GITHUB_WORKSPACE/aur-package"

      - name: Compute new pkgver
        id: pkgver
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"
          ref="origin/main"
          new_pkgver="$(
            (
              set -o pipefail
              git describe --long --tags --abbrev=7 "$ref" 2>/dev/null |
                sed 's/^v//;s/-/.r/;s/-/./'
            ) || printf "r%s.%s" "$(git rev-list --count "$ref")" "$(git rev-parse --short=7 "$ref")"
          )"
          echo "pkgver=$new_pkgver" >> "$GITHUB_OUTPUT"
          echo "Computed pkgver from $ref ($(git rev-parse --short=7 "$ref")): $new_pkgver"

      - name: Check if update needed
        id: check
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          cd aur-package
          current_pkgver=$(grep -E '^\s*pkgver=' PKGBUILD | sed 's/.*pkgver=//')
          echo "Current pkgver: $current_pkgver"
          echo "New pkgver: ${{ steps.pkgver.outputs.pkgver }}"
          if [ "$current_pkgver" = "${{ steps.pkgver.outputs.pkgver }}" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "No update needed"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed"
          fi

      - name: Update PKGBUILD
        if: steps.aur_key.outputs.has_key == 'true' && steps.check.outputs.needs_update == 'true'
        run: |
          set -euo pipefail
          cd aur-package
          sed -i "s/^pkgver=.*/pkgver=${{ steps.pkgver.outputs.pkgver }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          chown -R "$AUR_MAKEPKG_USER:$AUR_MAKEPKG_USER" .
          runuser -u "$AUR_MAKEPKG_USER" -- bash -lc "cd '$PWD' && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit and push to AUR
        if: steps.aur_key.outputs.has_key == 'true' && steps.check.outputs.needs_update == 'true'
        run: |
          cd aur-package
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.pkgver.outputs.pkgver }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push origin master

  update-aur-release:
    name: Update AUR package (release)
    needs: [format-check, clang-tidy, cppcheck, scan-build, semgrep, build-test, sanitize-linux, validate-release-tag]
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      AUR_MAKEPKG_USER: aurbuilder
    defaults:
      run:
        shell: bash
    if: github.repository == 'arancormonk/mbelib-neo' && github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Check AUR SSH key availability
        id: aur_key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "AUR_SSH_PRIVATE_KEY is not set; skipping AUR update steps."
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install AUR tooling
        if: steps.aur_key.outputs.has_key == 'true'
        run: pacman -Syu --noconfirm --needed git openssh curl

      - name: Create makepkg user
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          if ! id -u "$AUR_MAKEPKG_USER" >/dev/null 2>&1; then
            useradd --create-home --shell /bin/bash "$AUR_MAKEPKG_USER"
          fi

      - name: Checkout repository
        if: steps.aur_key.outputs.has_key == 'true'
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        if: steps.aur_key.outputs.has_key == 'true'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup SSH for AUR
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR package
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git clone ssh://aur@aur.archlinux.org/mbelib-neo.git aur-package
          git config --global --add safe.directory "$GITHUB_WORKSPACE/aur-package"

      - name: Compute release metadata
        id: release_meta
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          pkgver="${GITHUB_REF_NAME#v}"
          source_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          sha256="$(
            set -o pipefail
            curl -fsSL "$source_url" | sha256sum | awk '{print $1}'
          )"
          echo "pkgver=$pkgver" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "Computed release metadata: pkgver=$pkgver sha256=$sha256"

      - name: Check if update needed
        id: check
        if: steps.aur_key.outputs.has_key == 'true'
        run: |
          cd aur-package
          current_pkgver=$(sed -n 's/^pkgver=//p' PKGBUILD | head -n1)
          current_sha256=$(sed -n "s/^sha256sums=('\\([0-9a-f]\\{64\\}\\)').*/\\1/p" PKGBUILD | head -n1)
          echo "Current pkgver: $current_pkgver"
          echo "Current sha256: $current_sha256"
          echo "New pkgver: ${{ steps.release_meta.outputs.pkgver }}"
          echo "New sha256: ${{ steps.release_meta.outputs.sha256 }}"
          if [ "$current_pkgver" = "${{ steps.release_meta.outputs.pkgver }}" ] &&
             [ "$current_sha256" = "${{ steps.release_meta.outputs.sha256 }}" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "No update needed"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed"
          fi

      - name: Update PKGBUILD
        if: steps.aur_key.outputs.has_key == 'true' && steps.check.outputs.needs_update == 'true'
        run: |
          set -euo pipefail
          cd aur-package
          sed -i "s/^pkgver=.*/pkgver=${{ steps.release_meta.outputs.pkgver }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${{ steps.release_meta.outputs.sha256 }}')/" PKGBUILD
          chown -R "$AUR_MAKEPKG_USER:$AUR_MAKEPKG_USER" .
          runuser -u "$AUR_MAKEPKG_USER" -- bash -lc "cd '$PWD' && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit and push to AUR
        if: steps.aur_key.outputs.has_key == 'true' && steps.check.outputs.needs_update == 'true'
        run: |
          cd aur-package
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.release_meta.outputs.pkgver }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push origin master

  install-and-consume:
    needs: [format-check, clang-tidy, cppcheck, scan-build, semgrep]
    name: install + consume (pkg-config/CMake)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Ensure pkg-config is available (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config
      - name: Ensure pkg-config is available (macOS)
        if: runner.os == 'macOS'
        run: brew update && brew install pkg-config
      - name: Configure (dev-release preset)
        run: cmake --preset dev-release
      - name: Build (dev-release preset)
        run: cmake --build --preset dev-release --parallel
      - name: Install
        run: cmake --install build/dev-release --prefix "$RUNNER_TEMP/mbe-install"
      - name: Test pkg-config consumer
        env:
          PKG_CONFIG_PATH: ${{ runner.temp }}/mbe-install/lib/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          cat > consumer.c << 'EOF'
          #include <stdio.h>
          #include <mbelib-neo/mbelib.h>
          int main(void) {
            char ver[32] = {0};
            mbe_printVersion(ver);
            printf("version: %s\n", ver);
            return ver[0] ? 0 : 1;
          }
          EOF
          read -r -a pkg_config_flags <<< "$(pkg-config --cflags --libs libmbe-neo)"
          cc consumer.c "${pkg_config_flags[@]}" "-Wl,-rpath,${RUNNER_TEMP}/mbe-install/lib" -o consumer
          ./consumer
      - name: Test CMake package consumer
        run: |
          mkdir -p demo && cd demo
          cat > CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(consumer C)
          find_package(mbe-neo CONFIG REQUIRED)
          add_executable(consumer consumer.c)
          target_link_libraries(consumer PRIVATE mbe_neo::mbe_shared)
          EOF
          cat > consumer.c << 'EOF'
          #include <stdio.h>
          #include <mbelib-neo/mbelib.h>
          int main(void) {
            char ver[32] = {0};
            mbe_printVersion(ver);
            printf("version: %s\n", ver);
            return ver[0] ? 0 : 1;
          }
          EOF
          cmake -S . -B build -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/mbe-install" -DCMAKE_BUILD_RPATH="$RUNNER_TEMP/mbe-install/lib"
          cmake --build build --parallel
          ./build/consumer

  install-and-consume-win:
    needs: [format-check, clang-tidy, cppcheck, scan-build, semgrep]
    name: install + consume (CMake, Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Configure (dev-release preset)
        run: cmake --preset dev-release
      - name: Build (dev-release preset)
        run: cmake --build --preset dev-release --parallel
      - name: Install
        run: cmake --install build/dev-release --config Release --prefix "$env:RUNNER_TEMP\\mbe-install"
      - name: Test CMake package consumer (static link)
        shell: bash
        run: |
          mkdir -p demo && cd demo
          cat > CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(consumer C)
          find_package(mbe-neo CONFIG REQUIRED)
          add_executable(consumer consumer.c)
          # Link static to avoid DLL path concerns in CI
          target_link_libraries(consumer PRIVATE mbe_neo::mbe_static)
          EOF
          cat > consumer.c << 'EOF'
          #include <stdio.h>
          #include <mbelib-neo/mbelib.h>
          int main(void) {
            char ver[32] = {0};
            mbe_printVersion(ver);
            printf("version: %s\n", ver);
            return ver[0] ? 0 : 1;
          }
          EOF
          cmake -S . -B build -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/mbe-install"
          cmake --build build --config Release --parallel
          ./build/Release/consumer.exe

  package-release:
    name: package release (${{ matrix.os }})
    needs: [validate-release-tag, build-test, sanitize-linux, install-and-consume, install-and-consume-win]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Configure (dev-release preset)
        run: cmake --preset dev-release
      - name: Build (dev-release preset)
        run: cmake --build --preset dev-release --parallel
      - name: Test (dev-release preset)
        run: ctest --preset dev-release -V
      - name: Compute bundle name
        id: bundle
        shell: bash
        env:
          ARCHIVE_PREFIX: ${{ needs.validate-release-tag.outputs.archive_prefix }}
        run: |
          set -euxo pipefail
          case "${RUNNER_OS}" in
            Linux) platform="linux" ;;
            macOS) platform="macos" ;;
            Windows) platform="windows" ;;
            *)
              echo "Unsupported runner OS: ${RUNNER_OS}" >&2
              exit 1
              ;;
          esac

          arch=$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')
          echo "bundle_name=${ARCHIVE_PREFIX}-${platform}-${arch}" >> "$GITHUB_OUTPUT"
      - name: Package install tree (Unix)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        env:
          BUNDLE_NAME: ${{ steps.bundle.outputs.bundle_name }}
        run: |
          set -euxo pipefail
          staging_root="${RUNNER_TEMP}/release"
          staging_dir="${staging_root}/${BUNDLE_NAME}"
          archive_path="${RUNNER_TEMP}/${BUNDLE_NAME}.tar.gz"

          rm -rf "${staging_dir}" "${archive_path}"
          mkdir -p "${staging_dir}"

          cmake --install build/dev-release --prefix "${staging_dir}"
          tar -C "${staging_root}" -czf "${archive_path}" "${BUNDLE_NAME}"

          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"
      - name: Package install tree (Windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        env:
          BUNDLE_NAME: ${{ steps.bundle.outputs.bundle_name }}
        run: |
          $stagingRoot = Join-Path $env:RUNNER_TEMP 'release'
          $stagingDir = Join-Path $stagingRoot $env:BUNDLE_NAME
          $archivePath = Join-Path $env:RUNNER_TEMP "$($env:BUNDLE_NAME).zip"

          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          cmake --install build/dev-release --config Release --prefix $stagingDir
          Compress-Archive -Path $stagingDir -DestinationPath $archivePath -CompressionLevel Optimal

          "archive_path=$archivePath" >> $env:GITHUB_OUTPUT
      - name: Upload release package (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-package-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.package_unix.outputs.archive_path }}
          retention-days: 7
      - name: Upload release package (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-package-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.package_windows.outputs.archive_path }}
          retention-days: 7

  publish-release:
    name: Publish release
    needs: [validate-release-tag, package-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: release-package-*
          merge-multiple: true
      - name: Generate release checksums
        shell: bash
        run: |
          set -euxo pipefail
          cd dist
          sha256sum mbelib-neo-* > SHA256SUMS.txt
      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          set -euxo pipefail
          tag="${GITHUB_REF_NAME}"
          title="mbelib-neo ${RELEASE_VERSION}"

          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists; refusing to overwrite published assets." >&2
            exit 1
          fi

          gh release create "${tag}" dist/* --title "${title}" --generate-notes --verify-tag --repo "${GH_REPO}"
