rules:
  - id: mbelib-neo.no-shell-exec
    languages: [c]
    severity: ERROR
    message: Do not invoke shells or spawn processes from project-owned C code without explicit design review.
    paths:
      include:
        - /include/**
        - /src/**
        - /tests/**
        - /examples/**
        - /bench/**
      exclude:
        - /src/external/**
    pattern-either:
      - pattern: system(...)
      - pattern: popen(...)
      - pattern: execl(...)
      - pattern: execle(...)
      - pattern: execlp(...)
      - pattern: execv(...)
      - pattern: execve(...)
      - pattern: execvp(...)
      - pattern: posix_spawn(...)
      - pattern: posix_spawnp(...)

  - id: mbelib-neo.no-production-assert
    languages: [c, cpp]
    severity: ERROR
    message: >
      Use explicit runtime validation or unreachable handling in production code instead of assert(), which can compile
      out under NDEBUG.
    paths:
      include:
        - /include/**
        - /src/**
        - /examples/**
        - /bench/**
        - /fuzz/**
      exclude:
        - /src/external/**
    pattern: assert(...)

  - id: mbelib-neo.no-weak-process-rng
    languages: [c, cpp]
    severity: ERROR
    message: Do not use process-global rand()/srand(); use a purpose-specific RNG.
    paths:
      include:
        - /include/**
        - /src/**
        - /examples/**
        - /bench/**
        - /fuzz/**
      exclude:
        - /src/external/**
    pattern-either:
      - pattern: rand(...)
      - pattern: srand(...)

  - id: mbelib-neo.no-atoi-family
    languages: [c, cpp]
    severity: ERROR
    message: Use checked strto* parsing instead of atoi/atol/atoll/atof.
    paths:
      include:
        - /include/**
        - /src/**
        - /examples/**
        - /bench/**
        - /fuzz/**
      exclude:
        - /src/external/**
    pattern-either:
      - pattern: atoi(...)
      - pattern: atol(...)
      - pattern: atoll(...)
      - pattern: atof(...)
      - pattern: std::atoi(...)
      - pattern: std::atol(...)
      - pattern: std::atoll(...)
      - pattern: std::atof(...)

  - id: mbelib-neo.no-unchecked-strto-endptr
    languages: [c, cpp]
    severity: ERROR
    message: Check the strto* end pointer and range instead of passing NULL for endptr.
    paths:
      include:
        - /include/**
        - /src/**
        - /examples/**
        - /bench/**
        - /fuzz/**
      exclude:
        - /src/external/**
    pattern-either:
      - pattern: strtol($S, NULL, $B)
      - pattern: strtoul($S, NULL, $B)
      - pattern: strtoll($S, NULL, $B)
      - pattern: strtoull($S, NULL, $B)
      - pattern: strtod($S, NULL)
      - pattern: strtof($S, NULL)
      - pattern: strtol($S, nullptr, $B)
      - pattern: strtoul($S, nullptr, $B)
      - pattern: strtoll($S, nullptr, $B)
      - pattern: strtoull($S, nullptr, $B)
      - pattern: strtod($S, nullptr)
      - pattern: strtof($S, nullptr)
      - pattern: std::strtol($S, NULL, $B)
      - pattern: std::strtoul($S, NULL, $B)
      - pattern: std::strtoll($S, NULL, $B)
      - pattern: std::strtoull($S, NULL, $B)
      - pattern: std::strtod($S, NULL)
      - pattern: std::strtof($S, NULL)
      - pattern: std::strtol($S, nullptr, $B)
      - pattern: std::strtoul($S, nullptr, $B)
      - pattern: std::strtoll($S, nullptr, $B)
      - pattern: std::strtoull($S, nullptr, $B)
      - pattern: std::strtod($S, nullptr)
      - pattern: std::strtof($S, nullptr)

  - id: mbelib-neo.no-raw-file-open
    languages: [c, cpp]
    severity: ERROR
    message: Use an explicit project-approved file/path helper instead of raw file open/temp APIs in project-owned code.
    paths:
      include:
        - /include/**
        - /src/**
        - /examples/**
        - /bench/**
        - /fuzz/**
      exclude:
        - /src/external/**
    pattern-either:
      - pattern: fopen(...)
      - pattern: freopen(...)
      - pattern: open(...)
      - pattern: creat(...)
      - pattern: tmpfile(...)
      - pattern: tmpnam(...)
      - pattern: mktemp(...)
      - pattern: mkstemp(...)
      - pattern: mkstemps(...)

  - id: mbelib-neo.no-direct-third-party-include
    languages: [c]
    severity: ERROR
    message: Use a project-owned integration point instead of directly including bundled third-party headers.
    paths:
      include:
        - /include/**
        - /src/**
        - /tests/**
        - /examples/**
        - /bench/**
      exclude:
        - /src/external/**
        - /src/core/mbe_unvoiced_fft.c
    pattern-either:
      - pattern: '#include "src/external/..."'
      - pattern: '#include <src/external/...>'
      - pattern: '#include "pffft.h"'
      - pattern: '#include <pffft.h>'
      - pattern: '#include "fftpack.h"'
      - pattern: '#include <fftpack.h>'

  - id: mbelib-neo.github-actions.no-untrusted-context-in-run
    languages: [yaml]
    severity: ERROR
    message: Pass untrusted GitHub context through env or action inputs instead of interpolating it directly into a run block.
    paths:
      include:
        - /.github/workflows/*.yml
        - /.github/workflows/*.yaml
    patterns:
      - pattern: |
          run: $SCRIPT
      - metavariable-regex:
          metavariable: $SCRIPT
          regex: '(?s).*\$\{\{\s*github\.(?:head_ref|ref_name|event\.(?:issue\.(?:title|body)|comment\.body|pull_request\.(?:title|body)|pull_request\.head\.(?:ref|label)|pull_request\.head\.repo\.full_name)).*'
